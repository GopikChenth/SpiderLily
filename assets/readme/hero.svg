<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Spider Lily — Manga Reader for Android</title>
  <desc id="desc">Free and open-source Android manga reader featuring 1200+ sources, Tachiyomi extension compatibility, and clean Japanese dark aesthetics.</desc>

  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F14"/>
      <stop offset="60%" stop-color="#0B0B0E"/>
      <stop offset="100%" stop-color="#140A0D"/>
    </linearGradient>

    <linearGradient id="crimson-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E52E2E"/>
      <stop offset="100%" stop-color="#FF5A5A"/>
    </linearGradient>

    <linearGradient id="card-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A181E"/>
      <stop offset="100%" stop-color="#1F1A24"/>
    </linearGradient>

    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#E52E2E" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background Card -->
  <rect width="1200" height="360" rx="20" fill="url(#bg-gradient)"/>
  <rect width="1200" height="360" rx="20" fill="url(#dot-grid)"/>
  <rect x="0.5" y="0.5" width="1199" height="359" rx="19.5" fill="none" stroke="url(#card-border)" stroke-width="1"/>

  <!-- Left Accent Line -->
  <rect x="0" y="40" width="4" height="280" rx="2" fill="url(#crimson-glow)"/>

  <!-- Background Japanese Watermark Typography -->
  <g opacity="0.04" fill="#E52E2E">
    <text x="1140" y="240" font-family="'Yu Gothic', 'Hiragino Sans', 'Meiryo', sans-serif" font-size="190" font-weight="900" text-anchor="end">彼岸花</text>
  </g>

  <!-- Left Title Content Block -->
  <g transform="translate(60, 55)">
    <!-- Eyebrow Tag -->
    <g transform="translate(0, 0)">
      <rect width="210" height="28" rx="6" fill="#241014" stroke="#4A1820" stroke-width="1"/>
